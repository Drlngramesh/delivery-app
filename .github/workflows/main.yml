name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ~/delivery-app
          git pull
          docker stop delivery-app || true
          docker rm delivery-app || true
          docker build -t delivery-app .
          docker run -d -p 5001:5001 --name delivery-app delivery-app
